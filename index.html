<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- JuicyAds Site Verification -->
    <meta name="juicyads-site-verification" content="b1f8a2f6ed53f06db2fb8f592f4377c7">
    
    <title>Mevius Roller</title>
    
    <!-- Fluid Player CSS -->
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css" />
    <!-- Fluid Player JS -->
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .player-container {
            width: 100%;
            max-width: 800px;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="mevius-video" controls style="width: 100%; height: auto;">
            <!-- ဗီဒီယို Source လင့်ခ်ကို လိုအပ်သလို ထည့်သွင်းရန် -->
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
        </video>
    </div>

    <script>
        // Fluid Player Initialization
        var myPlayer = fluidPlayer(
            'mevius-video',
            {
                layoutControls: {
                    fillToContainer: true,
                    posterImage: '', // ဗီဒီယို Poster ပုံထည့်ရန် (သတ်မှတ်လိုပါက)
                    autoPlay: false,
                    mute: false,
                    allowTheatre: true,
                    playPauseAnimation: true,
                    playbackRateEnabled: true,
                    allowDownload: false,
                    logo: {
                        imageUrl: '', // လိုဂိုပုံထည့်ရန် (သတ်မှတ်လိုပါက)
                        position: 'top right',
                        clickUrl: '#'
                    }
                },
                vastOptions: {
                    // JuicyAds သို့မဟုတ် TrafficStars ကရလာမယ့် ဗီဒီယို VAST Ads လင့်ခ်ကို ဤနေရာတွင် ထည့်ပါရန်
                    adList: []
                }
            }
        );
    </script>

</body>
</html>
